<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Form - JsonPowerDB</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
<body>
<div class="container my-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
            <h3>Student Enrollment Form (Micro Project)</h3>
        </div>
        <div class="card-body">
            <form id="studentForm">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="rollNo">Roll No <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="rollNo" placeholder="Enter Roll No" onchange="getStudent()" onblur="getStudent()">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="fullName">Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="fullName" placeholder="Enter Full Name" disabled>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="studentClass">Class <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="studentClass" placeholder="Enter Class" disabled>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="birthDate">Birth Date <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="birthDate" disabled>
                    </div>
                </div>
                <div class="form-group">
                    <label for="address">Address <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="address" rows="2" placeholder="Enter Address" disabled></textarea>
                </div>
                <div class="form-group">
                    <label for="enrollmentDate">Enrollment Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="enrollmentDate" disabled>
                </div>
                
                <hr>
                <div class="text-center mt-4">
                    <button type="button" class="btn btn-success mx-2 px-4" id="save" onclick="saveData()" disabled>Save</button>
                    <button type="button" class="btn btn-warning mx-2 px-4" id="update" onclick="updateData()" disabled>Update</button>
                    <button type="button" class="btn btn-secondary mx-2 px-4" id="reset" onclick="resetForm()" disabled>Reset</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const jpdbBaseURL = "http://api.login2explore.com:5577";
    const connectionToken = "764066020|7385821567736244257|764064684"; // Your active fresh token
    const dbName = "SCHOOL-DB";
    const relName = "STUDENT-TABLE";

    $(document).ready(function() {
        resetForm();
    });

    function resetForm() {
        $("#rollNo").val("").prop("disabled", false);
        $("#fullName").val("").prop("disabled", true);
        $("#studentClass").val("").prop("disabled", true);
        $("#birthDate").val("").prop("disabled", true);
        $("#address").val("").prop("disabled", true);
        $("#enrollmentDate").val("").prop("disabled", true);
        
        $("#save").prop("disabled", true);
        $("#update").prop("disabled", true);
        $("#reset").prop("disabled", true);
        
        localStorage.removeItem("recno");
        $("#rollNo").focus();
    }

    function enableFormFieldsExceptPK() {
        $("#fullName").prop("disabled", false);
        $("#studentClass").prop("disabled", false);
        $("#birthDate").prop("disabled", false);
        $("#address").prop("disabled", false);
        $("#enrollmentDate").prop("disabled", false);
    }

    function getStudent() {
        var rollNo = $("#rollNo").val();
        if (rollNo === "") return;
        
        // Native JSON Request creation to eliminate external script dependency errors
        var getReq = {
            "token": connectionToken,
            "cmd": "GET_BY_KEY",
            "dbName": dbName,
            "relName": relName,
            "jsonStr": { "rollNo": rollNo }
        };

        $.ajax({
            url: jpdbBaseURL + "/api/irl",
            type: "POST",
            data: JSON.stringify(getReq),
            async: false,
            success: function(response) {
                var res = JSON.parse(response);
                if (res.status === 200) {
                    // Record exists
                    $("#rollNo").prop("disabled", true);
                    var data = JSON.parse(res.data).record;
                    localStorage.setItem("recno", JSON.parse(res.data).rec_no);
                    
                    $("#fullName").val(data.fullName);
                    $("#studentClass").val(data.studentClass);
                    $("#birthDate").val(data.birthDate);
                    $("#address").val(data.address);
                    $("#enrollmentDate").val(data.enrollmentDate);

                    $("#update").prop("disabled", false);
                    $("#reset").prop("disabled", false);
                    enableFormFieldsExceptPK();
                    $("#fullName").focus();
                }
            },
            error: function(xhr) {
                // Record does not exist (Status 400)
                $("#save").prop("disabled", false);
                $("#reset").prop("disabled", false);
                enableFormFieldsExceptPK();
                $("#fullName").focus();
            }
        });
    }

    function validateAndGetFormData() {
        var fields = ["#rollNo", "#fullName", "#studentClass", "#birthDate", "#address", "#enrollmentDate"];
        for (var i = 0; i < fields.length; i++) {
            if ($(fields[i]).val() === "") {
                alert("All fields are required!");
                $(fields[i]).focus();
                return "";
            }
        }
        return JSON.stringify({
            rollNo: $("#rollNo").val(),
            fullName: $("#fullName").val(),
            studentClass: $("#studentClass").val(),
            birthDate: $("#birthDate").val(),
            address: $("#address").val(),
            enrollmentDate: $("#enrollmentDate").val()
        });
    }

    function saveData() {
        var jsonStr = validateAndGetFormData();
        if (jsonStr === "") return;

        var putReq = {
            "token": connectionToken,
            "cmd": "PUT",
            "dbName": dbName,
            "relName": relName,
            "jsonStr": JSON.parse(jsonStr)
        };

        $.ajax({
            url: jpdbBaseURL + "/api/iml",
            type: "POST",
            data: JSON.stringify(putReq),
            success: function() {
                alert("Data saved successfully!");
                resetForm();
            }
        });
    }

    function updateData() {
        var jsonStr = validateAndGetFormData();
        if (jsonStr === "") return;
        
        var updateReq = {
            "token": connectionToken,
            "cmd": "UPDATE",
            "dbName": dbName,
            "relName": relName,
            "jsonStr": {
                [localStorage.getItem("recno")]: JSON.parse(jsonStr)
            }
        };

        $.ajax({
            url: jpdbBaseURL + "/api/iml",
            type: "POST",
            data: JSON.stringify(updateReq),
            success: function() {
                alert("Data updated successfully!");
                resetForm();
            }
        });
    }
</script>
</body>
</html>
